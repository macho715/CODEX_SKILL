interface:
  display_name: "MStack Plan"
  short_description: "Write pre-implementation plans and approval docs"
  default_prompt: "Use this skill only before coding begins. Produce a two-phase plan with approval points, architecture, file changes, dependencies, and test strategy. When coordinator escalation is possible, include objective, non-negotiables, acceptance criteria, option set, required evidence, and test expectations. Prefer mstack-pipeline only when the user wants implementation through release as well."
