interface:
  display_name: "MStack Dispatch"
  short_description: "Choose execution mode and ownership for multi-file work"
  default_prompt: "Use this skill to reconstruct current project state, treat approved planned scope as authoritative for the current run, choose direct execution, subagents, or parallel teams, and when the user asked to proceed, actually execute the chosen mode. If planned scope is 5+ files, cross-module, or API-changing, treat parallel execution as required; do not narrow that scope just because the live failure appears smaller unless the user changes scope or a new checkpoint explicitly re-approves the reduced target list. If required delegation cannot actually start, stop as blocked; do not implement locally or report success unless the user explicitly approves a single-agent fallback in the current thread. If the user wants one-shot end-to-end execution, prefer mstack-pipeline instead."
